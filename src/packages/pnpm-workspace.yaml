packages:
  # include all
  - "**"
  # but exclude cdn/dist since it is generated by npm as part of a
  # weird build system, and it totally messes up stuff.
  - "!**/cdn/dist/**"
  - "!compute"

# Build script approvals.  See https://pnpm.io/settings#allowbuilds.
allowBuilds:
  "@cocalc/gcloud-pricing-calculator": false
  "@cocalc/primus-multiplex": false
  "@cocalc/widgets": false
  "@nestjs/core": false
  "@openapitools/openapi-generator-cli": false
  "@parcel/watcher": false
  better-sqlite3: true
  bufferutil: false
  core-js: false
  diskusage: false
  dtrace-provider: false
  es5-ext: false
  protobufjs: false
  sharp: false
  storage-engine: false
  unrs-resolver: false
  utf-8-validate: false
  websocket-sftp: true
  websocketfs: true
  zeromq: true
  zstd-napi: true

minimumReleaseAge: 4320 # 3 days

minimumReleaseAgeExclude: []

# retry-request is because some other google api library in the server depends
# on an old broken version, which broke due to somebody deleting the request
# dependency of retry-request.
overrides:
  follow-redirects@<=1.15.11: 1.16.0
  es5-ext@<0.10.63: ^0.10.63
  undici@<5.28.3: ^5.28.4
  postcss@<8.5.10: ^8.5.10
  qs@<6.14.1: ^6.14.1
