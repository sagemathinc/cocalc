packages:
  # include all
  - "**"
  # but exclude cdn/dist since it is generated by npm as part of a
  # weird build system, and it totally messes up stuff.
  - "!**/cdn/dist/**"
  - "!compute"
minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - lodash
  - lodash-es

onlyBuiltDependencies:
  - better-sqlite3
  - websocket-sftp
  - websocketfs
  - zstd-napi
