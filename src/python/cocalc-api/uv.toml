exclude-newer = "3 days"

# Security floors for transitive dependencies (Dependabot alerts).
# idna: CVE-2024-3651 fix bypass, patched in 3.15.
# pymdown-extensions: sibling-prefix path traversal, patched in 10.21.3.
# starlette: form() limit bypass DoS + URL host poisoning + StaticFiles SSRF, patched in 1.3.1.
# python-multipart: querystring/Content-Disposition parsing DoS & smuggling, patched in 0.0.31.
# pyjwt: HS256 forgery / algorithm allow-list bypass / JWKS SSRF & DoS, patched in 2.13.0.
constraint-dependencies = [
    "idna>=3.15",
    "pymdown-extensions>=10.21.3",
    "starlette>=1.3.1",
    "python-multipart>=0.0.31",
    "pyjwt>=2.13.0",
]
